
name: CD - Infraestructura

on:
  workflow_run:
    workflows: ["CI - Infraestructura"]
    types:
      - completed
    branches: ["develop", "main"]

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

  TF_VAR_tenant_id:           ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  TF_VAR_ghcr_token:          ${{ secrets.GHCR_TOKEN }}
  TF_VAR_api_key:             ${{ secrets.API_KEY }}
  TF_VAR_jwt_secret:          ${{ secrets.JWT_SECRET }}
  TF_VAR_secrets_expiration_date: "2026-12-31T00:00:00Z"
  TF_VAR_project: "ecoanalyzer"

jobs:
  deploy-infra:
    name: Despliegue Infraestructura (Terraform)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Seleccionar entorno PRE/PRO
        id: entorno
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "dir=terraform/pre" >> $GITHUB_OUTPUT
            echo "env=pre" >> $GITHUB_OUTPUT
          else
            echo "dir=terraform/pro" >> $GITHUB_OUTPUT
            echo "env=pro" >> $GITHUB_OUTPUT
          fi

      - name: Login Azure CLI
        run: |
          az login --service-principal \
            --username "${{ env.ARM_CLIENT_ID }}" \
            --password "${{ env.ARM_CLIENT_SECRET }}" \
            --tenant "${{ env.ARM_TENANT_ID }}"
          az account set --subscription "${{ env.ARM_SUBSCRIPTION_ID }}"

      - name: terraform init
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform init

      - name: Sincronizar estado del Resource Group
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: |
          RG_NAME="rg-${{ env.TF_VAR_project }}-${{ steps.entorno.outputs.env }}"
          RG_ID="/subscriptions/${{ env.ARM_SUBSCRIPTION_ID }}/resourceGroups/$RG_NAME"

          echo "Comprobando si el RG $RG_NAME existe en Azure..."
          EXISTS=$(az group exists --name "$RG_NAME")

          if [ "$EXISTS" = "true" ]; then
            echo "El RG $RG_NAME existe en Azure."
            if terraform state list | grep -q "azurerm_resource_group.${{ steps.entorno.outputs.env }}"; then
              echo "El RG ya está en el estado. No se hace nada."
            else
              echo "El RG existe en Azure pero NO está en el estado. Importando..."
              terraform import azurerm_resource_group.${{ steps.entorno.outputs.env }} "$RG_ID"
            fi
          else
            echo "El RG $RG_NAME NO existe en Azure. Terraform lo creará en el apply."
          fi

      - name: terraform plan
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform plan -input=false -out=tfplan

      - name: terraform apply
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform apply -input=false -auto-approve tfplan
