name: CD - Infraestructura

on:
  workflow_run:
    workflows: ["CI - Infraestructura"]
    types:
      - completed
    branches: ["develop", "main"]

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID:       ${{ secrets.AZURE_OIDC_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  TF_VAR_tenant_id:           ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_ghcr_token:          ${{ secrets.GHCR_TOKEN }}
  TF_VAR_api_key:             ${{ secrets.API_KEY }}
  TF_VAR_jwt_secret:          ${{ secrets.JWT_SECRET }}
  TF_VAR_secrets_expiration_date: "2026-12-31T00:00:00Z"
  TF_VAR_project: "ecoanalyzer"
  TF_VAR_client_object_id: ${{ secrets.AZURE_OIDC_OBJECT_ID }}

jobs:
  deploy-infra:
    name: Despliegue Infraestructura (Terraform)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Seleccionar entorno PRE/PRO
        id: entorno
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "dir=terraform/pre" >> $GITHUB_OUTPUT
            echo "env=pre" >> $GITHUB_OUTPUT
          else
            echo "dir=terraform/pro" >> $GITHUB_OUTPUT
            echo "env=pro" >> $GITHUB_OUTPUT
          fi

      - name: terraform init
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform init -upgrade

      - name: Sincronizar estado del Resource Group
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: |
          RG_NAME="rg-${{ env.TF_VAR_project }}-${{ steps.entorno.outputs.env }}"
          RG_ID="/subscriptions/${{ env.ARM_SUBSCRIPTION_ID }}/resourceGroups/$RG_NAME"

          EXISTS=$(az group exists --name "$RG_NAME")

          if [ "$EXISTS" = "true" ]; then
            if terraform state list | grep -q "azurerm_resource_group.${{ steps.entorno.outputs.env }}"; then
              echo "El RG ya está en el estado."
            else
              terraform import azurerm_resource_group.${{ steps.entorno.outputs.env }} "$RG_ID"
            fi
          else
            echo "El RG no existe. Terraform lo creará."
          fi

      - name: terraform plan
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform plan -input=false -out=tfplan

      - name: terraform apply
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform apply -input=false -auto-approve tfplan
