name: CD - Infraestructura PRE/PRO

on:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

  TF_VAR_tenant_id:           ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  TF_VAR_ghcr_token:          ${{ secrets.GHCR_TOKEN }}
  TF_VAR_api_key:             ${{ secrets.API_KEY }}
  TF_VAR_jwt_secret:          ${{ secrets.JWT_SECRET }}
  TF_VAR_secrets_expiration_date: "2026-12-31T00:00:00Z"

jobs:

  infraestructura:
    name: Despliegue Infraestructura (Terraform)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Seleccionar entorno PRE/PRO
        id: entorno
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "dir=terraform/pre" >> $GITHUB_OUTPUT
            echo "env=pre" >> $GITHUB_OUTPUT
          else
            echo "dir=terraform/pro" >> $GITHUB_OUTPUT
            echo "env=pro" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform init -input=false
      - name: Login Azure CLI
        run: |
          az login --service-principal \
            --username "${{ env.ARM_CLIENT_ID }}" \
            --password "${{ env.ARM_CLIENT_SECRET }}" \
            --tenant "${{ env.ARM_TENANT_ID }}"

      - name: Limpiar estado si el RG no existe en Azure
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: |
          RG_NAME="rg-${{ env.TF_VAR_project }}-${{ steps.entorno.outputs.env }}"
          EXISTS=$(az group exists --name $RG_NAME)

          if [ "$EXISTS" = "false" ]; then
            echo "El RG $RG_NAME NO existe en Azure. Limpiando estado remoto..."
            terraform state rm azurerm_resource_group.${{ steps.entorno.outputs.env }} || true
          else
            echo "El RG $RG_NAME existe. No se limpia el estado."
          fi

      - name: Terraform Plan
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Exportar outputs
        working-directory: ${{ steps.entorno.outputs.dir }}
        run: terraform output -json > terraform-outputs.json

      - name: Publicar outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: ${{ steps.entorno.outputs.dir }}/terraform-outputs.json

  configuracion:
    name: Configuración Servidores (Ansible)
    runs-on: ubuntu-latest
    needs: infraestructura
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs
          path: .

      - name: Instalar Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible python3-pip jq curl openssl dnsutils netcat-traditional

      - name: Cargar APP_URL
        run: echo "APP_URL=$(jq -r '.app_url.value' terraform-outputs.json)" >> $GITHUB_ENV

      - name: Configurar PRE
        if: github.ref == 'refs/heads/develop'
        run: ansible-playbook -i inventories/pre/hosts site.yml -e "app_url=${APP_URL}"

      - name: Configurar PRO
        if: github.ref == 'refs/heads/main'
        run: ansible-playbook -i inventories/pro/hosts site.yml -e "app_url=${APP_URL}"

  postdeploy:
    name: Validaciones Post‑Despliegue
    runs-on: ubuntu-latest
    needs: configuracion

    steps:
      - name: Descargar outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs
          path: .

      - name: Cargar APP_URL
        run: echo "APP_URL=$(jq -r '.app_url.value' terraform-outputs.json)" >> $GITHUB_ENV

      - name: Health Check
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$APP_URL/health")
          if [ "$STATUS" != "200" ]; then exit 1; fi

      - name: Validación DNS
        run: |
          HOST=$(echo $APP_URL | sed 's~http[s]*://~~')
          dig +short $HOST || exit 1

      - name: Validación SSL
        run: |
          HOST=$(echo $APP_URL | sed 's~http[s]*://~~')
          echo | openssl s_client -servername $HOST -connect $HOST:443 2>/dev/null | openssl x509 -noout -dates || exit 1

      - name: Validación Puertos
        run: |
          HOST=$(echo $APP_URL | sed 's~http[s]*://~~')
          nc -zv $HOST 80 || exit 1
          nc -zv $HOST 443 || exit 1

      - name: Validación JSON
        run: |
          curl -s "$APP_URL" | jq . >/dev/null 2>&1 || exit 1
