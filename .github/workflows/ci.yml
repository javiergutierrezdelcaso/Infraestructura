name: CI - Infraestructura

on:
  pull_request:
  push:
    branches: ["develop", "main"]

permissions:
  contents: read
  id-token: write

jobs:

  # ============================================================
  # 1. VALIDACIÓN DE INFRAESTRUCTURA (TERRAFORM)
  # ============================================================
  terraform-validation:
    name: Validación de Infraestructura (Terraform)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Inicializar Terraform
        run: terraform init

      - name: Comprobación de formato
        run: terraform fmt -recursive -check

      - name: Validación de sintaxis
        run: terraform validate

      - name: Planificación PRE
        run: terraform plan -var="environment=pre" -out=tfplan-pre

      - name: Planificación PRO
        run: terraform plan -var="environment=pro" -out=tfplan-pro

      - name: Publicar planes de Terraform
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plans
          path: |
            terraform/tfplan-pre
            terraform/tfplan-pro

  # ============================================================
  # 2. AUDITORÍA DE SEGURIDAD IAC (TFSEC, CHECKOV, TERRASCAN, GITLEAKS)
  # ============================================================
  iac-security:
    name: Auditoría de Seguridad IaC
    runs-on: ubuntu-latest
    needs: terraform-validation
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      # --- TFSEC ---
      - name: Instalar tfsec
        run: curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: Análisis de seguridad (tfsec)
        run: tfsec .

      # --- CHECKOV ---
      - name: Instalar Checkov
        run: pipx install checkov

      - name: Análisis de cumplimiento (Checkov)
        run: checkov -d .

      # --- TERRASCAN ---
      - name: Instalar Terrascan
        run: |
          curl -L https://github.com/tenable/terrascan/releases/latest/download/terrascan_linux_amd64.tar.gz -o terrascan.tar.gz
          tar -xzf terrascan.tar.gz
          sudo mv terrascan /usr/local/bin/

      - name: Auditoría avanzada (Terrascan)
        run: terrascan scan -d .

      # --- GITLEAKS ---
      - name: Instalar Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Auditoría de secretos (Gitleaks)
        run: gitleaks detect --source .

      # --- TERRAFORM DOCS ---
      - name: Instalar terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.17.0/terraform-docs-v0.17.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          sudo mv terraform-docs /usr/local/bin/

      - name: Generación de documentación automática
        run: terraform-docs markdown table . > README.md

      - name: Publicar documentación
        uses: actions/upload-artifact@v4
        with:
          name: terraform-docs
          path: terraform/README.md

  # ============================================================
  # 3. VALIDACIÓN DE CONFIGURACIÓN (ANSIBLE)
  # ============================================================
  ansible-validation:
    name: Validación de Configuración (Ansible)
    runs-on: ubuntu-latest
    needs: iac-security
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Instalar Ansible y linters
        run: |
          sudo apt update
          sudo apt install -y ansible yamllint pipx
          pipx ensurepath
          pipx install ansible-lint

      - name: Validación YAML
        run: yamllint .

      - name: Validación de roles (ansible-lint)
        run: ansible-lint .

      - name: Validación sintáctica PRE
        run: ansible-playbook --syntax-check site.yml -i inventories/pre/hosts

      - name: Validación sintáctica PRO
        run: ansible-playbook --syntax-check site.yml -i inventories/pro/hosts

      - name: Prueba de idempotencia PRE
        run: ansible-playbook site.yml -i inventories/pre/hosts --check

      - name: Prueba de idempotencia PRO
        run: ansible-playbook site.yml -i inventories/pro/hosts --check


      #   # env:
      # ARM_CLIENT_ID: {{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      # ARM_CLIENT_SECRET: {{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      # ARM_TENANT_ID: {{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
      # ARM_SUBSCRIPTION_ID: {{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}