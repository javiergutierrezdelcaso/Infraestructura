name: CI - Infraestructura

on:
  pull_request:
  push:
    branches: ["develop", "main"]

permissions:
  contents: read


env:
  ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

  TF_VAR_arm_client_id:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  TF_VAR_arm_client_secret:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  TF_VAR_arm_tenant_id:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  TF_VAR_arm_subscription_id: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

  TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
  TF_VAR_api_key: ${{ secrets.API_KEY }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

jobs:

  ############################################
  # 1. VALIDACIÓN TERRAFORM (FMT, VALIDATE, PLAN PRE/PRO)
  ############################################
  
  terraform-validation:
    name: Validación de Infraestructura (Terraform)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: terraform fmt
        run: terraform fmt -recursive -check

      - name: terraform init
        run: terraform init

      - name: terraform validate
        run: terraform validate

      - name: Plan PRE
        run: terraform plan -var="environment=pre" -out=tfplan-pre

      - name: Plan PRO
        run: terraform plan -var="environment=pro" -out=tfplan-pro

      - name: Publicar planes
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plans
          path: |
            terraform/tfplan-pre
            terraform/tfplan-pro

  ############################################
  # 2. SEGURIDAD IAC (TFSEC, CHECKOV, TERRASCAN, GITLEAKS)
  ############################################
  iac-security:
    name: Auditoría de Seguridad IaC
    runs-on: ubuntu-latest
    needs: terraform-validation
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TFSEC
      - name: Instalar tfsec
        run: curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: tfsec
        run: tfsec .

      # CHECKOV
      - name: Instalar Checkov
        run: pipx install checkov

      - name: Checkov (cumplimiento + secretos)
        run: |
          checkov -d .
          checkov -d . --check CKV_SECRET_6

      # TERRASCAN
      - name: Instalar Terrascan
        run: |
          curl -L https://github.com/tenable/terrascan/releases/latest/download/terrascan_Linux_x86_64.tar.gz -o terrascan.tar.gz
          tar -xzf terrascan.tar.gz
          chmod +x terrascan
          sudo mv terrascan /usr/local/bin/terrascan


      - name: Terrascan
        run: terrascan scan -d .

      # GITLEAKS
      - name: Instalar Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks
        run: gitleaks detect --source . --no-banner

      # VALIDAR REFERENCIAS KEY VAULT EN APP SERVICE
      - name: Validar referencias Key Vault en Terraform
        run: |
          grep -R "@Microsoft.KeyVault" -n . || (echo "No se encontraron referencias a Key Vault en app_settings" && exit 1)

  ############################################
  # 3. VALIDACIÓN DE CONFIGURACIÓN (ANSIBLE)
  ############################################
  ansible-validation:
    name: Validación de Configuración (Ansible)
    runs-on: ubuntu-latest
    needs: iac-security
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Ansible y linters
        run: |
          sudo apt update
          sudo apt install -y ansible yamllint pipx
          pipx ensurepath
          pipx install ansible-lint

      - name: Validación YAML
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint .

      - name: Validación sintáctica PRE
        run: ansible-playbook --syntax-check site.yml -i inventories/pre/hosts

      - name: Validación sintáctica PRO
        run: ansible-playbook --syntax-check site.yml -i inventories/pro/hosts

      - name: Prueba de idempotencia PRE
        run: ansible-playbook site.yml -i inventories/pre/hosts --check

      - name: Prueba de idempotencia PRO
        run: ansible-playbook site.yml -i inventories/pro/hosts --check

      - name: Validar que no hay secretos hardcodeados en Ansible
        run: |
          ! grep -R "password" -n . || (echo "Se encontró 'password' en Ansible" && exit 1)
          ! grep -R "secret" -n . || (echo "Se encontró 'secret' en Ansible" && exit 1)
          ! grep -R "token" -n . || (echo "Se encontró 'token' en Ansible" && exit 1)
